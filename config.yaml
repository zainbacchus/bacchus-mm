# Public defaults. Override anything here in config.local.yaml (gitignored) —
# that's where tuned parameters live so they don't ship with the repo.
# Credentials NEVER go in config files; see .env.example.

env: demo # demo | prod (env var KALSHI_ENV overrides)

live:
  # Both this AND the --live CLI flag are required to place orders on prod.
  enabled: false

exchange:
  # Kalshi Basic tier allows 100 write tokens/s (order=10, cancel=2).
  # We self-limit well below that.
  write_tokens_per_second: 50
  # 2026-07-17 (C1): the websocket carries no order-status channel, so
  # exchange-initiated cancels are invisible without polling — maintenance
  # pauses (all our orders carry cancel_order_on_pause; 657 trading_is_paused
  # rejections in 4 days) and order-group trips both cancel everything. Every
  # reconcile_seconds the bot diffs exchange-resting orders against worker
  # refs: vanished orders release their risk exposure and get re-quoted;
  # untracked resting orders are cancelled. If EVERYTHING quoted vanishes in
  # one pass (group trip or maintenance), quoting cools off globally for
  # sweep_cooloff_seconds, then re-arms automatically (not the kill switch).
  reconcile_seconds: 45
  sweep_cooloff_seconds: 900
  # 2026-07-17 (M2): max wait on one websocket receive. The resubscribe flag
  # is only checked between messages; on a quiet book a bench promotion could
  # stay unsubscribed for hours. This caps the starvation at 30s of silence.
  ws_recv_timeout_seconds: 30
  # 2026-07-17 (M3): settlement & close-time handling. marks_tick_seconds is
  # the periodic mid/pnl mark cadence (today marks only happen on book deltas,
  # so a market that goes quiet stops marking). close_reaper_hours: below this
  # many hours to close, quotes are pulled and the market is never re-quoted
  # (a held position converts to the wind-down machinery instead of being
  # abandoned). settlement_poll_seconds: REST poll over tickers with open
  # positions, realizing position x (settlement - basis) when the market
  # reports determined/finalized with a result.
  marks_tick_seconds: 60
  close_reaper_hours: 12
  settlement_poll_seconds: 900

selector:
  # Calm categories only: news-driven categories (sports, crypto prices) will
  # pick off a slow market maker. Category names must match Kalshi series categories.
  categories:
    - Economics
    - Climate and Weather
  ticker_blocklist: [] # regexes matched against market/event tickers
  min_volume_24h: 500 # contracts
  min_spread: 0.02 # dollars; narrower pays too little
  max_spread: 0.15 # wider usually means a dead or toxic market
  min_price: 0.10 # stay out of the tails: asymmetric payoff risk
  max_price: 0.90
  min_hours_to_close: 12
  max_move_24h: 0.10 # falling-knife filter: skip markets that moved this much in 24h
  max_markets: 6
  volume_weight: 0.35
  spread_weight: 0.65
  refresh_minutes: 30

strategy:
  # Avellaneda-Stoikov parameters — see src/bacchus_mm/strategy/avellaneda_stoikov.py
  gamma: 0.3 # inventory risk aversion (higher = skews quotes harder)
  k: 50 # fill intensity; calibrated so base half-spread ~= 2c (higher = tighter)
  horizon_seconds: 3600
  sigma_floor: 0.004 # per-sqrt-second mid vol floor
  sigma_halflife_seconds: 600
  min_half_spread: 0.01
  max_half_spread: 0.05
  # 2026-07-17 (H1, owner-approved policy A): join the best level whenever the
  # book pays >= 2c of spread and joining keeps >= 1c of reservation edge.
  # Rationale: the old band (2c margin / 3c min spread) fired on 2.7% of 124k
  # live quote decisions; 55% of quotes rested behind the touch and the fill
  # rate was 0.26%. We trade thinner edge for queue position.
  # Judgment gate (REVIEW-2026-07-17 §5, S1): revert if markout@+600s
  # < -0.5c/contract over >= 60 fills.
  join_margin: 0.01
  min_book_spread: 0.02
  quote_size: 5 # contracts per side
  requote_min_interval: 1.0 # seconds between requote evaluations per market
  requote_tolerance: 0.01 # don't churn orders for < 1 tick of movement
  order_ttl_seconds: 900 # exchange-side expiry: orphaned orders die on their own
  tick: 0.01
  # Regime-shift circuit breaker: if the mid moves >= threshold within the
  # window, pull all quotes and stand aside for the cool-off. Motivated by
  # first live fills — a resting bid filled seconds into a 26c collapse.
  fast_move_threshold: 0.03
  fast_move_window: 30 # seconds
  fast_move_cooloff: 180 # seconds
  # 2026-07-17 (H6): the guard was hair-triggered — any single mid step >= 3c
  # tripped, but on 6-10c-wide books one pulled level moves the mid that much
  # (266 trips / 12 evictions in 4 days; KXRAINNYCM alone 65+34 pulls), evicting
  # exactly the wide books the selector prefers. Now: effective threshold =
  # max(fast_move_threshold, fast_move_spread_multiple x book spread); a 1x-2x
  # move must persist across fast_move_confirm_updates same-direction updates
  # (a >= 2x jump trips immediately); a trip counts toward eviction only if the
  # move persists past the cool-off, else guard_false_alarm is logged.
  fast_move_spread_multiple: 0.75
  fast_move_confirm_updates: 2
  # A market tripping the guard this many times in one session is evicted for
  # the session (2026-07-15: gas-CPI tripped 51x in 2.9h = pure cool-off churn).
  guard_evict_trips: 8
  # 2026-07-17 (M4): wind-down exit urgency. Wind-down exits rest post-only;
  # a position that stays unfilled past winddown_alert_minutes OR moves
  # against us by >= winddown_alert_move emits a loud winddown_distress event
  # (repeating at most every 15 min per market) — the 07-16 failure mode was
  # a short running 24c with a passive exit resting forever.
  winddown_alert_minutes: 30
  winddown_alert_move: 0.05
  # Escalation hatch, PLUMBED BUT DISABLED. "cross_1tick" lets a DISTRESSED
  # wind-down exit (and nothing else) cross one tick as a taker. FLIPPING
  # THIS IS AN EXPLICIT OWNER DECISION that weakens the post-only invariant —
  # even then the path still gates through approve_order and the fee model
  # (crosses only when the taker fee is smaller than the adverse move).
  winddown_escalation: none # none | cross_1tick

risk:
  max_contracts_per_market: 20
  max_notional_per_market: 100 # dollars of worst-case exposure per market
  max_gross_notional: 600 # dollars across all markets
  kill_switch_drawdown: 250 # halt at this drawdown from the ACCOUNT high-water (2026-07-17)
  order_group_contracts_per_15s: 40 # exchange-side runaway limit (Kalshi order group)
  # 2026-07-17 (M5): on prod+live, failure to create the order group (safety
  # layer 4, the exchange-side runaway guard) ABORTS startup. Setting this
  # true reverts to the old warn-and-trade-on behavior — an explicit owner
  # decision to run without that layer.
  allow_no_order_group: false

logging:
  dir: data
  # 2026-07-17 (M1): events/mids writes are queued and flushed in one
  # transaction every flush_seconds or flush_batch rows, whichever first
  # (was: commit+fsync per row — 145k rows/62MB in 4 days at 8 markets).
  # fills/pnl/kv stay synchronous: they carry money state and the dedup seed.
  flush_seconds: 1.0
  flush_batch: 500
  # Retention prunes ONLY the events firehose; the JSONL files are the
  # archive and fills/mids/pnl_marks/venue_marks/kv are kept forever.
  # Set <= 0 to disable pruning.
  events_keep_days: 14

# 2026-07-17 (DEPLOY): /health endpoint for fly.io machine checks (runbook:
# docs/deploy.md). Off by default locally; the HEALTH_PORT env var (set in
# fly.toml) force-enables it and overrides the port, so containers need no
# config change. 200 when healthy; 503 when halted or no event for 300s.
health:
  enabled: false
  port: 8080

# 2026-07-17 (M7): per-venue fee schedules. Kalshi's general schedule charges
# TAKER fills only: fees = round_up(0.07 x C x P x (1-P)) to the next cent
# (https://kalshi.com/docs/kalshi-fee-schedule.pdf, verified 2026-07-17;
# INX/NASDAQ-100 series use 0.035, election markets are fee-free — override
# here if we ever trade them). Our orders are post-only makers, but the ws
# reports fee_cost per fill and net-of-fee expectancy is the S2 gate metric.
# The adapter prefers the reported fee_cost and falls back to this formula.
# Add a polymarket: block when that adapter lands (PM US has nonzero base fees).
fees:
  kalshi:
    formula: kalshi_v1 # ceil(rate x C x P x (1-P) x 100)/100 dollars
    taker_rate: 0.07
    maker_rate: 0.0 # resting orders are free on Kalshi's general schedule

