# fly.toml app configuration file generated for bacchus-mm on 2026-07-19T00:28:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bacchus-mm'
primary_region = 'iad'
kill_signal = 'SIGINT'
kill_timeout = '1m0s'

[build]

[env]
  HEALTH_PORT = '8080'
  KALSHI_ENV = 'demo'

[processes]
  app = 'bacchus-mm run'

[[mounts]]
  source = 'bacchus_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '2m0s'
    method = 'get'
    path = '/health'

[[restart]]
  policy = 'always'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
